<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Protected Slides</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #password-gate {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #1a1a2e;
  }
  .auth-box {
    background: #16213e; border-radius: 12px; padding: 2.5rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center;
    max-width: 400px; width: 90%%;
  }
  .auth-box h2 { color: #e2e2e2; margin-bottom: 0.5rem; font-size: 1.3rem; }
  .auth-box p { color: #8892a4; margin-bottom: 1.5rem; font-size: 0.9rem; }
  .auth-box input[type="password"] {
    width: 100%%; padding: 0.75rem 1rem; border: 2px solid #2a3a5c;
    border-radius: 8px; background: #0f3460; color: #e2e2e2;
    font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  .auth-box input[type="password"]:focus { border-color: #e94560; }
  .auth-box button {
    margin-top: 1rem; width: 100%%; padding: 0.75rem;
    background: #e94560; color: white; border: none; border-radius: 8px;
    font-size: 1rem; cursor: pointer; transition: background 0.2s;
  }
  .auth-box button:hover { background: #c73652; }
  .error-msg { color: #e94560; margin-top: 0.75rem; font-size: 0.85rem; display: none; }
</style>
</head>
<body>
<div id="password-gate">
  <div class="auth-box">
    <h2>Protected Presentation</h2>
    <p>Enter the access code to view these slides.</p>
    <form id="auth-form" onsubmit="return checkPassword()">
      <input type="password" id="pwd" placeholder="Access code" autofocus/>
      <button type="submit">View Slides</button>
    </form>
    <div class="error-msg" id="error-msg">Incorrect access code. Please try again.</div>
  </div>
</div>
